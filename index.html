<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Masters 2026 — Draft Pool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ───────────────────── Augusta palette ───────────────────── */
  :root {
    --pine-darkest: #0a1d11;
    --pine-dark:    #0f2818;
    --pine:         #163826;
    --pine-light:   #1f4a32;
    --ivory:        #f7f3e8;
    --ivory-dim:    #d9d3c2;
    --ivory-faint:  #8a8674;
    --gold:         #fdb913;
    --gold-dark:    #c98e0a;
    --azalea:       #d94f70;
    --red-under:    #e63946;
    --white-line:   rgba(247,243,232,0.12);
    --serif-display: 'Cinzel', 'Trajan Pro', Georgia, serif;
    --serif: 'EB Garamond', Georgia, serif;
    --sans:  'Inter', -apple-system, system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--pine-darkest);
    color: var(--ivory);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  body {
    background:
      radial-gradient(ellipse at top, rgba(31,74,50,0.45) 0%, transparent 60%),
      linear-gradient(180deg, var(--pine-darkest) 0%, #060f08 100%);
    background-attachment: fixed;
  }

  /* ───────────────────── Layout ───────────────────── */
  .app {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }

  /* ───────────────────── Header ───────────────────── */
  header.masthead {
    text-align: center;
    padding: 48px 0 40px;
    border-bottom: 1px solid var(--white-line);
    margin-bottom: 32px;
    position: relative;
  }
  .crest {
    width: 200px;
    height: 180px;
    margin: 0 auto 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .crest svg { width: 100%; height: 100%; }
  .eyebrow {
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 6px;
  }
  .ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin: 14px auto 12px;
    max-width: 280px;
  }
  .ornament .line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold) 50%, transparent);
  }
  .ornament .dot {
    color: var(--gold);
    font-size: 12px;
    line-height: 1;
  }
  h1.title {
    font-family: var(--serif-display);
    font-size: 44px;
    font-weight: 500;
    letter-spacing: 0.14em;
    color: var(--ivory);
    line-height: 1;
    margin: 0 0 10px;
    text-transform: uppercase;
  }
  .subtitle {
    font-family: var(--serif);
    font-style: italic;
    font-size: 17px;
    color: var(--ivory-dim);
    font-weight: 400;
    letter-spacing: 0.02em;
  }
  .user-strip {
    position: absolute;
    top: 32px;
    right: 0;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ivory-faint);
  }
  .user-strip strong { color: var(--gold); font-weight: 600; }

  /* ───────────────────── Buttons ───────────────────── */
  button, .btn {
    font-family: var(--sans);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 600;
    padding: 12px 22px;
    background: var(--gold);
    color: var(--pine-darkest);
    border: none;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s ease;
  }
  button:hover:not(:disabled) { background: #ffc733; transform: translateY(-1px); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary {
    background: transparent;
    color: var(--ivory);
    border: 1px solid var(--white-line);
  }
  button.secondary:hover:not(:disabled) {
    background: var(--pine);
    border-color: var(--gold);
  }
  button.danger { background: var(--red-under); color: var(--ivory); }

  /* ───────────────────── Inputs ───────────────────── */
  input[type=text], input[type=number], select {
    font-family: var(--sans);
    font-size: 14px;
    padding: 10px 14px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--white-line);
    color: var(--ivory);
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: var(--gold); }

  /* ───────────────────── Cards / panels ───────────────────── */
  .panel {
    background: rgba(15,40,24,0.6);
    border: 1px solid var(--white-line);
    border-radius: 3px;
    padding: 28px;
    margin-bottom: 24px;
  }
  .panel-title {
    font-family: var(--serif-display);
    font-size: 22px;
    font-weight: 500;
    color: var(--ivory);
    margin-bottom: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .panel-eyebrow {
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 18px;
    font-weight: 500;
  }

  /* ───────────────────── Login ───────────────────── */
  .login-wrap {
    max-width: 460px;
    margin: 60px auto;
    text-align: center;
  }
  .login-wrap input { width: 100%; margin: 18px 0; text-align: center; font-size: 18px; padding: 14px; }
  .login-wrap p.note { color: var(--ivory-faint); font-size: 12px; margin-top: 14px; font-style: italic; font-family: var(--serif); }

  /* ───────────────────── Lobby ───────────────────── */
  .lobby-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    margin: 22px 0;
  }
  .lobby-player {
    padding: 16px;
    background: var(--pine-dark);
    border: 1px solid var(--white-line);
    border-radius: 2px;
    text-align: center;
    position: relative;
  }
  .lobby-player.ready { border-color: var(--gold); background: rgba(253,185,19,0.08); }
  .lobby-player .name { font-family: var(--serif); font-size: 18px; font-weight: 500; }
  .lobby-player .status { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ivory-faint); margin-top: 4px; }
  .lobby-player.ready .status { color: var(--gold); }
  .lobby-player .badge {
    position: absolute;
    top: 6px;
    right: 6px;
    font-size: 8px;
    letter-spacing: 0.1em;
    background: var(--gold);
    color: var(--pine-darkest);
    padding: 2px 6px;
    border-radius: 2px;
    font-weight: 700;
  }
  .ready-warning {
    margin-top: 18px;
    padding: 14px 18px;
    background: rgba(253, 185, 19, 0.08);
    border: 1px solid var(--gold-dark);
    border-left: 3px solid var(--gold);
    border-radius: 2px;
    font-family: var(--serif);
    font-size: 14px;
    color: var(--ivory);
    line-height: 1.55;
  }
  .admin-player-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    margin-top: 18px;
  }
  .admin-player {
    position: relative;
    padding: 14px;
    background: var(--pine-dark);
    border: 1px solid var(--white-line);
    border-radius: 2px;
  }
  .admin-player.is-commish { border-color: var(--gold); background: rgba(253,185,19,0.08); }
  .admin-player .badge {
    position: absolute;
    top: 6px;
    right: 6px;
    font-size: 8px;
    letter-spacing: 0.1em;
    background: var(--gold);
    color: var(--pine-darkest);
    padding: 2px 6px;
    border-radius: 2px;
    font-weight: 700;
  }
  .admin-player .login-name {
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ivory-faint);
    margin-bottom: 8px;
  }
  .admin-player .dn-label {
    display: block;
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 4px;
    font-weight: 600;
  }
  .admin-player .dn-input {
    width: 100%;
    font-size: 14px;
    padding: 8px 10px;
    font-family: var(--serif);
  }
  .admin-player .status {
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    align-self: center;
  }
  .reset-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    margin-top: 24px;
    padding: 16px 18px;
    background: rgba(230, 57, 70, 0.08);
    border: 1px solid rgba(230, 57, 70, 0.45);
    border-left: 3px solid var(--red-under);
    border-radius: 2px;
  }
  .reset-row .reset-title {
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--red-under);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .reset-row .reset-sub {
    font-family: var(--serif);
    font-size: 13px;
    color: var(--ivory-dim);
    font-style: italic;
  }

  /* ───────────────────── Admin score list (no accordion) ───────────────────── */
  .score-list {
    margin-top: 16px;
    border: 1px solid var(--white-line);
    border-radius: 2px;
    overflow: hidden;
  }
  .score-row {
    display: grid;
    grid-template-columns: 1fr 110px 70px 110px;
    gap: 12px;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--white-line);
    background: rgba(0,0,0,0.18);
  }
  .score-row:last-child { border-bottom: none; }
  .score-row:nth-child(even) { background: rgba(0,0,0,0.30); }
  .score-row.is-cut { opacity: 0.55; }
  .score-row .sr-name {
    font-family: var(--serif);
    font-size: 16px;
    color: var(--ivory);
  }
  .score-row .sr-name small {
    display: block;
    font-family: var(--sans);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ivory-faint);
    margin-top: 2px;
  }
  .score-row .sr-input input {
    width: 100%;
    text-align: center;
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 600;
    padding: 8px 6px;
  }
  .score-row .sr-display {
    font-family: var(--serif-display);
    font-size: 22px;
    font-weight: 600;
    text-align: center;
    color: var(--ivory);
    font-variant-numeric: tabular-nums;
  }
  .score-row .sr-display.under { color: var(--red-under); }
  .score-row .sr-cut {
    padding: 7px 10px;
    font-size: 9px;
    letter-spacing: 0.12em;
  }
  @media (max-width: 640px) {
    .score-row {
      grid-template-columns: 1fr 90px;
      gap: 8px;
    }
    .score-row .sr-display, .score-row .sr-cut {
      grid-column: span 1;
    }
  }
  .ready-warning strong {
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 700;
    margin-right: 8px;
  }
  .ready-warning em {
    font-style: normal;
    font-weight: 600;
    color: var(--gold);
  }

  .countdown-overlay {
    position: fixed;
    inset: 0;
    background: rgba(6,15,8,0.96);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .countdown-overlay .label {
    font-size: 12px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
  }
  .countdown-overlay .num {
    font-family: var(--serif-display);
    font-size: 200px;
    font-weight: 600;
    color: var(--ivory);
    line-height: 1;
  }
  .countdown-overlay .roulette {
    font-family: var(--serif-display);
    font-size: 32px;
    color: var(--gold);
    margin-top: 24px;
    min-height: 50px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* ───────────────────── Wheel of fortune (draft order reveal) ───────────────────── */
  .wheel-overlay {
    padding: 24px;
  }
  .wheel-pick-label {
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 18px;
  }
  .wheel-stage {
    position: relative;
    width: min(78vmin, 560px);
    height: min(78vmin, 560px);
  }
  .wheel-pointer {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 30px solid var(--gold);
    z-index: 4;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
  }
  .wheel-rotor {
    position: absolute;
    inset: 0;
    transform: rotate(0deg);
    animation: wheelSpin var(--spin-duration, 3s) cubic-bezier(0.16, 0.71, 0.21, 0.99) forwards;
    transform-origin: 50% 50%;
  }
  .wheel-rotor .wheel-svg { width: 100%; height: 100%; display: block; }
  @keyframes wheelSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(var(--final-rot, 720deg)); }
  }
  .wheel-hub {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 110px;
    text-align: center;
    pointer-events: none;
    z-index: 3;
  }
  .wheel-hub .hub-eyebrow {
    font-family: var(--sans);
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 2px;
  }
  .wheel-hub .hub-name {
    font-family: var(--serif-display);
    font-size: 13px;
    color: var(--ivory);
    line-height: 1.1;
  }
  .wheel-revealed {
    margin-top: 22px;
    font-family: var(--serif-display);
    font-size: 30px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--gold);
    text-shadow: 0 0 26px rgba(253,185,19,0.4);
    opacity: 0;
    animation: revealFade 1s ease-out forwards;
    animation-delay: var(--spin-duration, 3s);
    min-height: 38px;
  }
  @keyframes revealFade {
    from { opacity: 0; transform: translateY(8px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @media (prefers-reduced-motion: reduce) {
    .wheel-rotor { animation: none; transform: rotate(var(--final-rot, 0deg)); }
    .wheel-revealed { animation: none; opacity: 1; }
  }

  /* ───────────────────── Tabs ───────────────────── */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--white-line);
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .tab {
    background: transparent;
    color: var(--ivory-dim);
    padding: 14px 20px;
    border-bottom: 2px solid transparent;
    border-radius: 0;
    letter-spacing: 0.16em;
    font-size: 11px;
  }
  .tab:hover { background: transparent; color: var(--ivory); transform: none; }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* ───────────────────── Draft view ───────────────────── */
  .draft-grid {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 24px;
  }
  @media (max-width: 900px) { .draft-grid { grid-template-columns: 1fr; } }

  .on-clock {
    text-align: center;
    padding: 20px;
    background: rgba(253,185,19,0.08);
    border: 1px solid var(--gold);
    margin-bottom: 18px;
    border-radius: 2px;
    position: relative;
    transition: background 0.3s ease;
  }
  .on-clock .lbl { font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); }
  .on-clock .who { font-family: var(--serif-display); font-size: 24px; margin: 6px 0; letter-spacing: 0.08em; text-transform: uppercase; }
  .on-clock .timer { font-family: var(--serif-display); font-size: 56px; font-weight: 600; color: var(--ivory); line-height: 1; }
  .on-clock .timer.warn { color: var(--red-under); }

  /* My turn — pulsing gold glow + sweeping highlight */
  .on-clock.my-turn {
    background: rgba(253,185,19,0.16);
    border-width: 2px;
    animation: myTurnPulse 1.6s ease-in-out infinite;
    overflow: hidden;
  }
  .on-clock.my-turn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent 30%, rgba(253,185,19,0.18) 50%, transparent 70%);
    transform: translateX(-100%);
    animation: myTurnSweep 3s ease-in-out infinite;
    pointer-events: none;
  }
  .on-clock.my-turn .lbl {
    animation: myTurnLabelFlash 1.6s ease-in-out infinite;
  }
  .on-clock.my-turn .who {
    color: var(--gold);
    text-shadow: 0 0 18px rgba(253,185,19,0.55);
    animation: myTurnNamePop 1.6s ease-in-out infinite;
  }
  .on-clock.my-turn .you-tag {
    display: inline-block;
    margin-left: 8px;
    padding: 4px 10px;
    background: var(--gold);
    color: var(--pine-darkest);
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.18em;
    font-weight: 700;
    border-radius: 2px;
    vertical-align: middle;
    animation: youTagBounce 1.6s ease-in-out infinite;
  }
  @keyframes myTurnPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(253,185,19,0.55), 0 0 30px rgba(253,185,19,0.20) inset; border-color: var(--gold); }
    50%      { box-shadow: 0 0 0 12px rgba(253,185,19,0.00), 0 0 50px rgba(253,185,19,0.35) inset; border-color: #ffd560; }
  }
  @keyframes myTurnSweep {
    0%   { transform: translateX(-100%); }
    60%  { transform: translateX(100%); }
    100% { transform: translateX(100%); }
  }
  @keyframes myTurnLabelFlash {
    0%, 100% { opacity: 0.7; letter-spacing: 0.28em; }
    50%      { opacity: 1;   letter-spacing: 0.34em; }
  }
  @keyframes myTurnNamePop {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.04); }
  }
  @keyframes youTagBounce {
    0%, 100% { transform: translateY(0) scale(1); }
    50%      { transform: translateY(-2px) scale(1.06); }
  }
  @media (prefers-reduced-motion: reduce) {
    .on-clock.my-turn,
    .on-clock.my-turn::before,
    .on-clock.my-turn .lbl,
    .on-clock.my-turn .who,
    .on-clock.my-turn .you-tag { animation: none; }
  }

  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .filter-chip {
    font-size: 10px;
    letter-spacing: 0.18em;
    padding: 7px 14px;
    background: transparent;
    color: var(--ivory-dim);
    border: 1px solid var(--white-line);
    border-radius: 99px;
  }
  .filter-chip.active { background: var(--gold); color: var(--pine-darkest); border-color: var(--gold); }
  .filter-chip:hover:not(.active) { background: var(--pine); transform: none; }

  .golfer-list {
    max-height: 540px;
    overflow-y: auto;
    border: 1px solid var(--white-line);
    border-radius: 2px;
  }
  .golfer-row {
    display: grid;
    grid-template-columns: 1fr 110px;
    align-items: center;
    padding: 11px 16px;
    border-bottom: 1px solid var(--white-line);
    gap: 10px;
  }
  .golfer-row:last-child { border-bottom: none; }
  .golfer-row.taken { opacity: 0.32; }
  .golfer-row .gname { font-family: var(--serif); font-size: 17px; }
  .golfer-row button { padding: 6px 12px; font-size: 10px; letter-spacing: 0.12em; }
  .golfer-row .owner-pill {
    font-size: 9px;
    letter-spacing: 0.1em;
    background: var(--pine-light);
    color: var(--ivory);
    padding: 3px 7px;
    border-radius: 2px;
    text-align: center;
    font-weight: 600;
    text-transform: uppercase;
  }

  .draft-board { font-size: 13px; }
  .draft-board h3 {
    font-family: var(--serif);
    font-size: 15px;
    font-weight: 500;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-bottom: 10px;
  }
  .draft-pick {
    display: grid;
    grid-template-columns: 28px 1fr;
    padding: 7px 0;
    border-bottom: 1px solid var(--white-line);
    gap: 8px;
    align-items: center;
  }
  .draft-pick .num { color: var(--ivory-faint); font-size: 11px; font-variant-numeric: tabular-nums; }
  .draft-pick .info { font-family: var(--serif); font-size: 14px; }
  .draft-pick .info small { display: block; font-family: var(--sans); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ivory-faint); }
  .draft-pick.current { background: rgba(253,185,19,0.08); padding-left: 8px; padding-right: 8px; }

/* ════════════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════════════ */
function fmtToPar(n) {
  if (n === 0 || n === null || n === undefined || isNaN(n)) return n === 0 ? 'E' : '—';
  if (n > 0) return '+' + n;
  return String(n);
}
function golferById(id) { return FIELD.find(g => g.id === id); }
function fmtOdds(n) { return '+' + n.toLocaleString(); }
function uid() { return 'p_' + Math.random().toString(36).slice(2, 10); }

function getGolferScore(golferId) {
  const s = state.scores[golferId];
  if (!s) return null;
  if (s.cut) return MISSED_CUT_SCORE;
  if (typeof s.total === 'number') return s.total;
  return null;
}

function getPlayerGolfers(playerId) {
  if (!state.draftState || !state.draftState.picks) return [];
  return Object.values(state.draftState.picks)
    .filter(p => p.playerId === playerId)
    .map(p => p.golferId);
}

function getPlayerTotal(playerId) {
  const golfers = getPlayerGolfers(playerId);
  const scores = golfers.map(g => {
    const sc = getGolferScore(g);
    return sc === null ? 0 : sc;
  });
  scores.sort((a, b) => a - b);
  return scores.slice(0, 4).reduce((a, b) => a + b, 0);
}

function pickedGolferIds() {
  if (!state.draftState || !state.draftState.picks) return new Set();
  return new Set(Object.values(state.draftState.picks).map(p => p.golferId));
}

function getDraftOrderForPick(pickNumber, baseOrder) {
  // 0-indexed pickNumber. Snake: round 0 = forward, round 1 = reverse, ...
  const n = baseOrder.length;
  const round = Math.floor(pickNumber / n);
  const idxInRound = pickNumber % n;
  const idx = (round % 2 === 0) ? idxInRound : (n - 1 - idxInRound);
  return baseOrder[idx];
}

function totalPicks() {
  const n = Object.keys(state.players).length;
  return n * TEAM_SIZE;
}

// Display label for a player: admin-set displayName overrides login name.
function playerLabel(playerId) {
  const p = state.players[playerId];
  if (!p) return '—';
  return p.displayName || p.name || '—';
}

const STORAGE_VERSION = 'v2';

function nameToId(name) {
  const slug = (name || '').toLowerCase().replace(/[^a-z0-9]/g, '').slice(0, 30);
  return slug ? 'p_' + slug : null;
}

function loadMe() {
  // One-time clear of any pre-name-based-id sessions
  if (localStorage.getItem('masters2026_v') !== STORAGE_VERSION) {
    localStorage.removeItem('masters2026_me');
    localStorage.setItem('masters2026_v', STORAGE_VERSION);
    return;
  }
  const saved = localStorage.getItem('masters2026_me');
  if (saved) {
    try { state.me = JSON.parse(saved); } catch(e){}
  }
}
function saveMe() {
  localStorage.setItem('masters2026_me', JSON.stringify(state.me));
  localStorage.setItem('masters2026_v', STORAGE_VERSION);
}

function joinPool(name) {
  const id = nameToId(name);
  if (!id) { alert('Please enter a valid name (letters or numbers).'); return; }
  state.me = { id, name };
  saveMe();
  // If this name already has a slot, just adopt it. Otherwise create one.
  ROOT.child('players/' + id).once('value', snap => {
    if (!snap.exists()) {
      ROOT.child('players/' + id).set({
        name,
        joinedAt: Date.now(),
        ready: false,
        order: Object.keys(state.players).length
      });
      // First player becomes commissioner
      ROOT.child('commissioner').transaction(cur => cur || id);
    }
    render();
  });
  ROOT.child('status').transaction(cur => cur || 'waiting');
}

function startDraftCountdown() {
  // Build a fully shuffled draft order up front. The wheel just reveals it.
  const playerIds = Object.keys(state.players);
  if (playerIds.length < 2) { alert('Need at least 2 players'); return; }
  const draftOrder = [...playerIds];
  for (let i = draftOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [draftOrder[i], draftOrder[j]] = [draftOrder[j], draftOrder[i]];
  }

  ROOT.child('status').set('countdown');
  ROOT.child('draftState').set({
    countdownStart: Date.now(),
    countdownPhase: 'ready',   // ready -> wheel -> done
    draftOrder,
    spinIndex: 0,
    currentPick: 0,
    picks: {},
  });

  // After the ready countdown, kick off the wheel reveal.
  setTimeout(() => beginWheelPhase(draftOrder), READY_COUNTDOWN * 1000);
}

function beginWheelPhase(draftOrder) {
  ROOT.child('draftState/countdownPhase').set('wheel');
  runWheelSpin(0, draftOrder);
}

function runWheelSpin(idx, draftOrder) {
  if (idx >= draftOrder.length) {
    // All picks revealed — start the actual draft.
    ROOT.child('draftState/order').set(draftOrder);
    ROOT.child('draftState/wheel').remove();
    ROOT.child('draftState/countdownPhase').set('done');
    ROOT.child('status').set('drafting');
    ROOT.child('draftState/timerEnd').set(Date.now() + PICK_TIMER * 1000);
    return;
  }
  const remaining = draftOrder.slice(idx);
  // Shuffle the visible wheel arrangement so the target lands somewhere new each spin
  const wheel = [...remaining];
  for (let i = wheel.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [wheel[i], wheel[j]] = [wheel[j], wheel[i]];
  }
  const targetId = draftOrder[idx];
  const targetIdx = wheel.indexOf(targetId);

  ROOT.child('draftState/wheel').set({
    players: wheel,
    targetIdx,
    pickNumber: idx + 1,
    startTime: Date.now()
  });
  ROOT.child('draftState/spinIndex').set(idx);

  setTimeout(() => runWheelSpin(idx + 1, draftOrder), SPIN_DURATION_MS + SPIN_PAUSE_MS);
}

/* ════════════════════════════════════════════════════════════════════
   DRAFT ACTIONS
═══════════════════════════════════════════════════════════════════════ */
function makePick(golferId, isAuto = false) {
  if (!state.draftState) return;
  const ds = state.draftState;
  const picksObj = ds.picks || {};
  const pickNum = ds.currentPick || 0;
  const onClock = getDraftOrderForPick(pickNum, ds.order);
  if (!isAuto && onClock !== state.me.id) return;
  if (pickedGolferIds().has(golferId)) return;

  const updates = {};
  updates['picks/' + pickNum] = {
    golferId, playerId: onClock, auto: isAuto, timestamp: Date.now()
  };
  updates['currentPick'] = pickNum + 1;

  const total = totalPicks();
  if (pickNum + 1 >= total) {
    updates['timerEnd'] = null;
    ROOT.child('draftState').update(updates);
    ROOT.child('status').set('complete');
  } else {
    updates['timerEnd'] = Date.now() + PICK_TIMER * 1000;
    ROOT.child('draftState').update(updates);
  }
}

function autoPick() {
  // Random golfer from best available tier
  const taken = pickedGolferIds();
  const available = FIELD.filter(g => !taken.has(g.id));
  if (available.length === 0) return;
  const minTier = Math.min(...available.map(g => g.tier));
  const tierGolfers = available.filter(g => g.tier === minTier);
  const choice = tierGolfers[Math.floor(Math.random() * tierGolfers.length)];
  makePick(choice.id, true);
}

/* ════════════════════════════════════════════════════════════════════
   TIMER LOOP
═══════════════════════════════════════════════════════════════════════ */
let timerInterval = null;
let lastTimerCheck = 0;
function startTimerLoop() {
  if (timerInterval) return;
  timerInterval = setInterval(() => {
    const ds = state.draftState;
    if (!ds) return;

    // Pre-draft countdown overlay (ready phase + wheel phase)
    if (state.status === 'countdown' && ds.countdownStart) {
      updateCountdownOverlay();
      return;
    }

    if (state.status !== 'drafting') return;
    if (!ds.timerEnd) return;

    const remaining = Math.max(0, Math.ceil((ds.timerEnd - Date.now()) / 1000));
    const el = document.getElementById('pickTimer');
    if (el) {
      el.textContent = remaining;
      el.classList.toggle('warn', remaining <= 5);
    }
    // Auto-pick on timeout — only commissioner triggers it to avoid duplicates
    if (remaining === 0 && state.me?.id === state.commissioner && Date.now() - lastTimerCheck > 2000) {
      lastTimerCheck = Date.now();
      autoPick();
    }
  }, 250);
}

function updateCountdownOverlay() {
  const ds = state.draftState;
  if (!ds || !ds.countdownStart) return;
  if (ds.countdownPhase !== 'ready') return; // wheel phase has its own DOM
  const elapsed = (Date.now() - ds.countdownStart) / 1000;
  const numEl = document.getElementById('countdownNum');
  if (!numEl) return;
  const remaining = Math.max(0, Math.ceil(READY_COUNTDOWN - elapsed));
  numEl.textContent = remaining;
}

function render() {
  const root = document.getElementById('screen');

  // If the pool was reset (or we were removed), drop our local session
  // and show the login screen so we can rejoin cleanly.
  if (state.me && state.playersLoaded && !state.players[state.me.id]) {
    localStorage.removeItem('masters2026_me');
    state.me = null;
  }

  // Auto-switch tabs on status transitions
  if (state.status !== state.lastStatus) {
    if (state.status === 'drafting') state.tab = 'draft';
    if (state.status === 'complete') state.tab = 'leaderboard';
    state.lastStatus = state.status;
  }

  // Update user strip
  if (state.me) {
    document.getElementById('userStrip').classList.remove('hidden');
    document.getElementById('userStripName').textContent = state.me.name;
  } else {
    document.getElementById('userStrip')?.classList.add('hidden');
  }

  if (!state.me) { root.innerHTML = renderLogin(); return; }

  // Capture focus before re-render so score inputs don't lose focus on tick.
  const active = document.activeElement;
  const focusId = active && active.id ? active.id : null;
  const selStart = active && 'selectionStart' in active ? active.selectionStart : null;
  const selEnd = active && 'selectionEnd' in active ? active.selectionEnd : null;

  if (state.status === 'waiting') {
    root.innerHTML = renderLobby();
  } else if (state.status === 'countdown') {
    root.innerHTML = renderCountdown();
    startTimerLoop();
  } else {
    // Draft / complete: show tabs
    root.innerHTML = renderTabs() + renderTabContent();
    startTimerLoop();
  }

  // Restore focus if the same element exists after re-render
  if (focusId) {
    const el = document.getElementById(focusId);
    if (el && typeof el.focus === 'function') {
      el.focus();
      if (selStart != null && 'setSelectionRange' in el) {
        try { el.setSelectionRange(selStart, selEnd); } catch (e) {}
      }
    }
  }
}

function renderWheelOverlay(ds) {
  const w = ds.wheel;
  const totalPlayers = (ds.draftOrder || []).length;
  const pickNum = w.pickNumber || ((ds.spinIndex || 0) + 1);
  const targetId = w.players[w.targetIdx];
  const segDeg = 360 / w.players.length;
  // Land target slice center at top (where the pointer is)
  const targetCenter = (w.targetIdx + 0.5) * segDeg;
  const finalRotation = 360 * 6 - targetCenter; // 6 spins then settle
  const winnerName = playerLabel(targetId);
  // The wheel SVG itself is wrapped in a key tied to spinIndex so React-style
  // remount happens (CSS animation re-fires) for each new pick.
  return `
    <div class="countdown-overlay wheel-overlay">
      <div class="wheel-pick-label">Picking #${pickNum} of ${totalPlayers}</div>
      <div class="wheel-stage">
        <div class="wheel-pointer"></div>
        <div class="wheel-rotor"
             data-spin="${ds.spinIndex || 0}"
             style="--final-rot:${finalRotation}deg; --spin-duration:${SPIN_DURATION_MS}ms;">
          ${buildWheelSVG(w.players)}
        </div>
        <div class="wheel-hub">
          <div class="hub-eyebrow">Pick ${pickNum}</div>
          <div class="hub-name" id="wheelHubName">…</div>
        </div>
      </div>
      <div class="wheel-revealed" id="wheelRevealed"
           style="--spin-duration:${SPIN_DURATION_MS}ms;">${winnerName}</div>
    </div>
  `;
}

function buildWheelSVG(playerIds) {
  const n = playerIds.length;
  const cx = 250, cy = 250, r = 230;
  const segAngle = (2 * Math.PI) / n;
  const colors = ['#163826', '#1f4a32'];
  let html = `<svg viewBox="0 0 500 500" class="wheel-svg" xmlns="http://www.w3.org/2000/svg">`;
  // Outer ring
  html += `<circle cx="${cx}" cy="${cy}" r="${r+4}" fill="none" stroke="#fdb913" stroke-width="3"/>`;
  // Slices
  for (let i = 0; i < n; i++) {
    const a1 = i * segAngle - Math.PI/2;
    const a2 = (i+1) * segAngle - Math.PI/2;
    const x1 = cx + r * Math.cos(a1);
    const y1 = cy + r * Math.sin(a1);
    const x2 = cx + r * Math.cos(a2);
    const y2 = cy + r * Math.sin(a2);
    const largeArc = segAngle > Math.PI ? 1 : 0;
    html += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${largeArc} 1 ${x2},${y2} Z" fill="${colors[i % 2]}" stroke="#c98e0a" stroke-width="1.2"/>`;
  }
  // Labels (radial, reading inward to outward)
  const labelR = r * 0.62;
  const fontSize = Math.max(12, Math.min(22, 26 - Math.floor(n * 0.6)));
  for (let i = 0; i < n; i++) {
    const aMid = (i + 0.5) * segAngle - Math.PI/2;
    const lx = cx + labelR * Math.cos(aMid);
    const ly = cy + labelR * Math.sin(aMid);
    const rotDeg = (aMid * 180/Math.PI) + 90;
    const name = String(playerLabel(playerIds[i])).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
    html += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" fill="#f7f3e8" font-family="Cinzel, Trajan Pro, Georgia, serif" font-size="${fontSize}" font-weight="600" transform="rotate(${rotDeg} ${lx} ${ly})">${name}</text>`;
  }
  // Center cap
  html += `<circle cx="${cx}" cy="${cy}" r="40" fill="#0a1d11" stroke="#fdb913" stroke-width="2"/>`;
  html += `</svg>`;
  return html;
}

            <div class="lbl">${myTurn ? 'You Are On The Clock' : 'On The Clock'}</div>
            <div class="who">
              ${playerLabel(onClockId)}
              ${myTurn ? '<span class="you-tag">YOUR PICK</span>' : ''}
            </div>
            <div class="timer" id="pickTimer">${PICK_TIMER}</div>
            <div style="font-size:10px; letter-spacing:0.18em; color:var(--ivory-faint); margin-top:6px;">
              PICK ${(ds.currentPick || 0) + 1} OF ${totalPicks()}
            </div>
          </div>
        `}

        <div class="filter-row">
          <button class="filter-chip ${state.hideTaken ? 'active' : ''}"
                  onclick="state.hideTaken=!state.hideTaken;render()">
            ${state.hideTaken ? '✓ ' : ''}Hide Drafted
          </button>
        </div>

        <div class="golfer-list">
          ${filtered.map(g => {
            const isTaken = taken.has(g.id);
            const ownerPick = isTaken
              ? Object.values(ds.picks || {}).find(p => p.golferId === g.id)
              : null;
            const owner = ownerPick ? playerLabel(ownerPick.playerId) : null;
            return `
              <div class="golfer-row ${isTaken ? 'taken' : ''}">
                <div class="gname">${g.name}</div>
                <div>
                  ${isTaken
                    ? `<div class="owner-pill">${owner || '—'}</div>`
                    : (myTurn && !draftComplete
                        ? `<button onclick="makePick('${g.id}')">Draft</button>`
                        : '')}
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>

      <div class="draft-board">
        <h3>Picks</h3>
        ${(() => {
          const picks = ds.picks || {};
          const totalP = totalPicks();
          let html = '';
          for (let i = 0; i < Math.min(totalP, 60); i++) {
            const pick = picks[i];
            const isCurrent = !draftComplete && i === (ds.currentPick || 0);
            const playerForSlot = pick ? playerLabel(pick.playerId) : playerLabel(getDraftOrderForPick(i, ds.order));
            html += `
              <div class="draft-pick ${isCurrent ? 'current' : ''}">
                <div class="num">${i + 1}.</div>
                <div class="info">
                  ${pick ? golferById(pick.golferId)?.name || '?' : '—'}
                  <small>${playerForSlot}${pick?.auto ? ' · AUTO' : ''}</small>
                </div>
              </div>
            `;
          }
          return html;
        })()}
      </div>
    </div>
  `;
}

/* ──────── LEADERBOARD TAB ──────── */
function renderLeaderboardTab() {
  if (!state.draftState || state.draftState.currentPick === 0) {
    return '<div class="empty-state">Leaderboard appears once the draft begins.</div>';
  }
  return `
    <div class="lb-toggle">
      <button class="${state.lbView === 'pool' ? 'active' : ''}" onclick="state.lbView='pool';render()">Pool Standings</button>
      <button class="${state.lbView === 'golfers' ? 'active' : ''}" onclick="state.lbView='golfers';render()">All Golfers</button>
      <button class="${state.lbView === 'teams' ? 'active' : ''}" onclick="state.lbView='teams';render()">By Team</button>
    </div>
    ${state.lbView === 'pool' ? renderPoolStandings() : ''}
    ${state.lbView === 'golfers' ? renderAllGolfers() : ''}
    ${state.lbView === 'teams' ? renderByTeam() : ''}
  `;
}

function renderPoolStandings() {
  const players = Object.entries(state.players).map(([id, p]) => ({
    id, name: playerLabel(id), total: getPlayerTotal(id)
  })).sort((a, b) => a.total - b.total);

  return `
    <div class="leaderboard">
      <div class="lb-header simple">
        <div>POS</div><div>PLAYER</div><div style="text-align:right;">TO PAR</div>
      </div>
      ${players.map((p, i) => `
        <div class="lb-row simple">
          <div class="pos">${i + 1}</div>
          <div class="nm">${p.name}</div>
          <div class="score ${p.total < 0 ? 'under' : ''}">${fmtToPar(p.total)}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderAllGolfers() {
  const picked = state.draftState?.picks || {};
  const ownerByGolfer = {};
  const draftedIds = new Set();
  Object.values(picked).forEach(p => {
    ownerByGolfer[p.golferId] = playerLabel(p.playerId);
    draftedIds.add(p.golferId);
  });

  const rows = FIELD
    .filter(g => draftedIds.has(g.id))
    .map(g => {
      const sc = getGolferScore(g.id);
      const cut = state.scores[g.id]?.cut;
      return { ...g, score: sc, cut, owner: ownerByGolfer[g.id] };
    })
    .sort((a, b) => {
      const sa = a.score === null ? 999 : a.score;
      const sb = b.score === null ? 999 : b.score;
      return sa - sb;
    });

  if (rows.length === 0) {
    return '<div class="empty-state">No drafted golfers yet.</div>';
  }

  return `
    <div class="leaderboard">
      <div class="lb-header simple">
        <div>POS</div><div>GOLFER</div><div style="text-align:right;">TO PAR</div>
      </div>
      ${rows.map((g, i) => `
        <div class="lb-row simple">
          <div class="pos">${g.score === null ? '—' : i + 1}</div>
          <div class="nm">
            ${g.name}${g.cut ? '<span class="cut-badge">CUT</span>' : ''}
            ${g.owner ? `<small><span class="owner-tag">${g.owner}</span></small>` : ''}
          </div>
          <div class="score ${g.score !== null && g.score < 0 ? 'under' : ''}">${g.score === null ? '—' : fmtToPar(g.score)}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderByTeam() {
  const players = Object.entries(state.players).map(([id, p]) => ({
    id, name: playerLabel(id), total: getPlayerTotal(id)
  })).sort((a, b) => a.total - b.total);

  return players.map(p => {
    const golfers = getPlayerGolfers(p.id).map(gid => {
      const g = golferById(gid);
      const sc = getGolferScore(gid);
      const cut = state.scores[gid]?.cut;
      return { id: gid, name: g?.name || '?', tier: g?.tier, score: sc === null ? 0 : sc, rawScore: sc, cut };
    }).sort((a, b) => a.score - b.score);

    return `
      <div class="team-section">
        <div class="team-header">
          <div class="teamname">${p.name}</div>
          <div class="teamtotal ${p.total < 0 ? 'under' : ''}">${fmtToPar(p.total)}</div>
        </div>
        <div class="team-roster">
          ${golfers.map((g, i) => {
            if (i === 4) {
              return `<div class="cut-line">── BEST 4 CUT LINE ──</div>` + renderTeamRow(g, i);
            }
            return renderTeamRow(g, i);
          }).join('')}
          ${golfers.length === 0 ? '<div class="empty-state">No golfers drafted yet.</div>' : ''}
        </div>
      </div>
    `;
  }).join('');
}

function renderTeamRow(g, i) {
  const dropped = i >= 4;
  return `
    <div class="team-row ${dropped ? 'dropped' : ''}">
      <div class="pos">${i + 1}</div>
      <div class="nm">${g.name}${g.cut ? '<span class="cut-badge">CUT</span>' : ''}${dropped ? ' <small style="font-size:9px;letter-spacing:0.1em;color:var(--ivory-faint);">DROPPED</small>' : ''}</div>
      <div class="sc ${g.rawScore !== null && g.rawScore < 0 ? 'under' : ''}">${g.rawScore === null ? '—' : fmtToPar(g.rawScore)}</div>
    </div>
  `;
}

/* ──────── ADMIN TAB ──────── */
function renderAdminTab() {
  if (!isAdmin) return '<div class="empty-state">Admin access required.</div>';
  const drafted = new Set();
  Object.values(state.draftState?.picks || {}).forEach(p => drafted.add(p.golferId));
  const draftedList = FIELD.filter(g => drafted.has(g.id));
  const playerList = Object.entries(state.players).sort((a, b) => (a[1].joinedAt || 0) - (b[1].joinedAt || 0));

  return `
    ${renderCommissionerControls(playerList)}
    <div class="panel">
      <div class="panel-eyebrow">Score Entry</div>
      <div class="panel-title">Admin Console</div>
      <p style="color:var(--ivory-dim); font-style:italic; font-family:var(--serif); margin-top:6px;">
        Type each drafted golfer's current score to par (negative for under, e.g. <em>-7</em>). Updates push live.
      </p>
      <div class="score-list">
        ${draftedList.length === 0 ? '<div class="empty-state">No golfers drafted yet.</div>' : ''}
        ${draftedList.map(g => renderAdminScoreRow(g)).join('')}
      </div>
    </div>
  `;
}

function renderAdminScoreRow(g) {
  const s = state.scores[g.id] || {};
  const score = getGolferScore(g.id);
  const ownerPick = Object.values(state.draftState?.picks || {}).find(p => p.golferId === g.id);
  const owner = ownerPick ? playerLabel(ownerPick.playerId) : '';
  const inputVal = typeof s.total === 'number' && !s.cut ? s.total : '';

  return `
    <div class="score-row ${s.cut ? 'is-cut' : ''}">
      <div class="sr-name">
        ${g.name}
        <small>OWNED BY ${owner || '—'}${s.cut ? ' · CUT' : ''}</small>
      </div>
      <div class="sr-input">
        <input type="number" id="sc_${g.id}" value="${inputVal}" placeholder="—"
               ${s.cut ? 'disabled' : ''}
               onchange="setTotalScore('${g.id}', this.value)" />
      </div>
      <div class="sr-display ${score !== null && score < 0 ? 'under' : ''}">
        ${score === null ? '—' : fmtToPar(score)}
      </div>
      <button class="secondary sr-cut" onclick="toggleCut('${g.id}')">${s.cut ? 'Restore' : 'Mark Cut'}</button>
    </div>
  `;
}

/* ════════════════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════════════════ */
loadMe();
render();
</script>
